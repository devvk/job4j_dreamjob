<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<main class="container">
    <div class="row mt-3 mb-3 text-center">
        <div class="col">
            <h1>Вход</h1>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-6">

            <form class="mt-3" th:action="@{/users/login}" method="post">
                <div class="row mb-3" th:if="${error}">
                    <div class="col">
                        <p class="alert alert-danger" role="alert" th:text="${error}"></p>
                    </div>
                </div>
                <div class="row mb-3">
                    <label for="email" class="form-label"><b>Почта</b></label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="name@mail.com" required>
                </div>
                <div class="row mb-3">
                    <label for="password" class="form-label"><b>Пароль</b></label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="row mb-3 justify-content-center">
                    <div class="col-6">
                        <a class="btn btn-danger w-100" th:href="@{/index}">Отмена</a>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-primary w-100" type="submit">Войти</button>
                </div>

                <div class="row mb-3 justify-content-center">
                    <div class="col text-center">
                        Не зарегистрированы?
                        <a th:href="@{/users/register}">Зарегистрироваться</a>
                    </div>
                </div>
            </form>

        </div>
    </div>

</main>
</body>
</html>
