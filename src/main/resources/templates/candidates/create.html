<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<main class="container">
    <div class="row mt-3 mb-3 text-center">
        <div class="col">
            <h1>Создание резюме</h1></div>
    </div>

    <form class="mt-3" th:action="@{/candidates/create}" method="post">
        <div class="row mb-3">
            <label for="name" class="form-label"><b>Имя</b></label>
            <input type="text" class="form-control" id="name" name="name"
                   placeholder="Имя кандидата">
        </div>
        <div class="row mb-3">
            <label for="description" class="form-label"><b>Описание</b></label>
            <textarea class="form-control" id="description" name="description"
                      rows="15" placeholder="Опишите ваш опыт"></textarea>
        </div>
        <div class="row mb-3">
            <label for="city" class="form-label"><b>Город</b></label>
            <select class="form-control" id="city" name="cityId">
                <option th:each="city: ${cities}"
                        th:value="${city.id}" th:text="${city.name}">
                </option>
            </select>
        </div>
        <div class="row mb-3 justify-content-center">
            <div class="col-6">
                <div class="row">
                    <div class="col-6">
                        <a class="btn btn-danger w-100" th:href="@{/candidates}">Отмена</a>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-primary w-100" type="submit">Сохранить</button>
                    </div>
                </div>
            </div>
        </div>
    </form>

</main>
</body>
</html>
