<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<main class="container py-3">
    <form th:action="@{/candidates/update}" method="post" th:object="${candidate}" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}"/>
        <div class="row mb-3 text-center">
            <div class="col">
                <h1>Редактирование кандидата</h1>
            </div>
        </div>
        <div class="row mb-3" th:if="*{fileId > 0}">
            <div class="col-md-3">
                <img th:src="@{/files/{fileId}(fileId=*{fileId})}" class="w-100 img-thumbnail" alt="No image"/>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="formFile" class="form-label"><b>Фото</b></label>
                <input type="file" class="form-control" id="formFile" name="file">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="name" class="form-label"><b>Имя</b></label>
                <input type="text" class="form-control" id="name"
                       th:field="*{name}"
                       placeholder="Имя кандидата">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="description" class="form-label"><b>Описание</b></label>
                <textarea class="form-control" id="description" rows="10"
                          th:field="*{description}"
                          placeholder="Опишите ваш опыт">
                </textarea>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="city" class="form-label"><b>Город</b></label>
                <select class="form-control" id="city" th:field="*{cityId}">
                    <option th:each="city: ${cities}"
                            th:value="${city.id}" th:text="${city.name}">
                </select>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4">
                <a class="btn btn-light w-100" th:href="@{/candidates}">Отмена</a>
            </div>
            <div class="col-md-4">
                <a class="btn btn-danger w-100" th:href="@{/candidates/delete/{id}(id=${candidate.id})}">Удалить</a>
            </div>
            <div class="col-md-4">
                <button class="btn btn-success w-100" type="submit">Сохранить</button>
            </div>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
