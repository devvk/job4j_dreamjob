<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<main class="container">
    <div class="row mt-3 mb-3 text-center">
        <div class="col">
            <h1>Создание вакансии</h1>
        </div>
    </div>
    <form class="mt-3" th:action="@{/vacancies/create}" method="post">
        <div class="row mb-3">
            <label for="title" class="form-label"><b>Название</b></label>
            <input type="text" class="form-control" id="title" name="title" placeholder="Предлагаемая должность, например, Ведущий Java разработчик">
        </div>
        <div class="row mb-3">
            <label for="description" class="form-label"><b>Описание</b></label>
            <textarea class="form-control" id="description" name="description" rows="20" placeholder="Опишите требования к кандидату"></textarea>
        </div>
        <div class="row mb-3 justify-content-center">
            <div class="col-6">
                <div class="row">
                    <div class="col-6">
                        <a class="btn btn-danger w-100" th:href="@{/vacancies}">Отмена</a>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-primary w-100" type="submit">Сохранить</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</main>
</body>
</html>
